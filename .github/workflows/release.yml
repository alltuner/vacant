name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      engine_tag:
        description: "Rebuild/republish the engine pipeline for this tag (e.g. vacant-v0.4.3). Leave blank to defer to release-please."
        required: false
        type: string
      python_tag:
        description: "Rebuild/republish the python pipeline for this tag (e.g. vacant-py-v0.3.6). Leave blank to defer to release-please."
        required: false
        type: string
      js_tag:
        description: "Rebuild/republish the js pipeline for this tag (e.g. vacant-js-v0.4.1). Leave blank to defer to release-please."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      engine_release_created: ${{ steps.release.outputs['crates/vacant--release_created'] }}
      engine_tag_name: ${{ steps.release.outputs['crates/vacant--tag_name'] }}
      engine_version: ${{ steps.release.outputs['crates/vacant--version'] }}
      python_release_created: ${{ steps.release.outputs['python--release_created'] }}
      python_tag_name: ${{ steps.release.outputs['python--tag_name'] }}
      js_release_created: ${{ steps.release.outputs['js--release_created'] }}
      js_tag_name: ${{ steps.release.outputs['js--tag_name'] }}
    steps:
      - id: release
        if: github.event_name != 'workflow_dispatch' || (inputs.engine_tag == '' && inputs.python_tag == '' && inputs.js_tag == '')
        uses: googleapis/release-please-action@v5
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  resolve-tags:
    needs: release-please
    runs-on: ubuntu-latest
    outputs:
      engine_tag: ${{ steps.pick.outputs.engine_tag }}
      engine_version: ${{ steps.pick.outputs.engine_version }}
      python_tag: ${{ steps.pick.outputs.python_tag }}
      js_tag: ${{ steps.pick.outputs.js_tag }}
    steps:
      - id: pick
        env:
          DISPATCH_ENGINE_TAG: ${{ inputs.engine_tag }}
          DISPATCH_PYTHON_TAG: ${{ inputs.python_tag }}
          DISPATCH_JS_TAG: ${{ inputs.js_tag }}
          RP_ENGINE_CREATED: ${{ needs.release-please.outputs.engine_release_created }}
          RP_ENGINE_TAG: ${{ needs.release-please.outputs.engine_tag_name }}
          RP_ENGINE_VERSION: ${{ needs.release-please.outputs.engine_version }}
          RP_PYTHON_CREATED: ${{ needs.release-please.outputs.python_release_created }}
          RP_PYTHON_TAG: ${{ needs.release-please.outputs.python_tag_name }}
          RP_JS_CREATED: ${{ needs.release-please.outputs.js_release_created }}
          RP_JS_TAG: ${{ needs.release-please.outputs.js_tag_name }}
        run: |
          if [ -n "$DISPATCH_ENGINE_TAG" ]; then
            echo "engine_tag=$DISPATCH_ENGINE_TAG" >> "$GITHUB_OUTPUT"
            echo "engine_version=${DISPATCH_ENGINE_TAG#v}" >> "$GITHUB_OUTPUT"
          elif [ "$RP_ENGINE_CREATED" = "true" ]; then
            echo "engine_tag=$RP_ENGINE_TAG" >> "$GITHUB_OUTPUT"
            echo "engine_version=$RP_ENGINE_VERSION" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$DISPATCH_PYTHON_TAG" ]; then
            echo "python_tag=$DISPATCH_PYTHON_TAG" >> "$GITHUB_OUTPUT"
          elif [ "$RP_PYTHON_CREATED" = "true" ]; then
            echo "python_tag=$RP_PYTHON_TAG" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$DISPATCH_JS_TAG" ]; then
            echo "js_tag=$DISPATCH_JS_TAG" >> "$GITHUB_OUTPUT"
          elif [ "$RP_JS_CREATED" = "true" ]; then
            echo "js_tag=$RP_JS_TAG" >> "$GITHUB_OUTPUT"
          fi

  publish-crate:
    needs: [release-please, resolve-tags]
    if: needs.resolve-tags.outputs.engine_tag != ''
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-tags.outputs.engine_tag }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: cargo publish -p vacant
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  build-binaries:
    needs: [release-please, resolve-tags]
    if: needs.resolve-tags.outputs.engine_tag != ''
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-tags.outputs.engine_tag }}

      - uses: houseabsolute/actions-rust-cross@v1.0.7
        with:
          target: ${{ matrix.target }}
          args: --release --package vacant
          strip: true

      - name: Create archive
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../vacant-${{ matrix.target }}.tar.gz vacant

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.resolve-tags.outputs.engine_tag }}
          files: vacant-${{ matrix.target }}.tar.gz

  brew-formula:
    needs: [resolve-tags, build-binaries]
    if: needs.resolve-tags.outputs.engine_tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Download release tarballs
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve-tags.outputs.engine_tag }}
        run: |
          for target in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern "vacant-$target.tar.gz"
          done

      - name: Generate and push formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ needs.resolve-tags.outputs.engine_tag }}
          VERSION: ${{ needs.resolve-tags.outputs.engine_version }}
        run: |
          MAC_ARM_SHA=$(sha256sum vacant-aarch64-apple-darwin.tar.gz | awk '{print $1}')
          MAC_INTEL_SHA=$(sha256sum vacant-x86_64-apple-darwin.tar.gz | awk '{print $1}')
          LINUX_ARM_SHA=$(sha256sum vacant-aarch64-unknown-linux-gnu.tar.gz | awk '{print $1}')
          LINUX_INTEL_SHA=$(sha256sum vacant-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')

          BASE_URL="https://github.com/alltuner/vacant/releases/download/${TAG}"

          FORMULA_CONTENT=$(cat <<RUBY
          class Vacant < Formula
            desc "Fast domain availability checker via authoritative DNS"
            homepage "https://github.com/alltuner/vacant"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/vacant-aarch64-apple-darwin.tar.gz"
                sha256 "${MAC_ARM_SHA}"
              else
                url "${BASE_URL}/vacant-x86_64-apple-darwin.tar.gz"
                sha256 "${MAC_INTEL_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${BASE_URL}/vacant-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_ARM_SHA}"
              else
                url "${BASE_URL}/vacant-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_INTEL_SHA}"
              end
            end

            def install
              bin.install "vacant"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/vacant --version")
            end
          end
          RUBY
          )

          ENCODED=$(echo "$FORMULA_CONTENT" | base64 -w 0)
          EXISTING_SHA=$(gh api repos/alltuner/homebrew-tap/contents/Formula/vacant.rb -q '.sha' 2>/dev/null || true)

          if [ -n "$EXISTING_SHA" ]; then
            gh api repos/alltuner/homebrew-tap/contents/Formula/vacant.rb \
              --method PUT \
              -f message="vacant: update to v${VERSION}" \
              -f content="$ENCODED" \
              -f sha="$EXISTING_SHA"
          else
            gh api repos/alltuner/homebrew-tap/contents/Formula/vacant.rb \
              --method PUT \
              -f message="vacant: add formula at v${VERSION}" \
              -f content="$ENCODED"
          fi

  build-wheels-linux:
    needs: [release-please, resolve-tags]
    if: needs.resolve-tags.outputs.python_tag != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-tags.outputs.python_tag }}

      - name: Mirror canonical rules into python wheel layout
        run: cp rules/rules.toml python/vacant/rules.toml

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          target: ${{ matrix.target }}
          manylinux: 2_28
          args: --release --out dist

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.target }}
          path: python/dist

  build-wheels-macos:
    needs: [release-please, resolve-tags]
    if: needs.resolve-tags.outputs.python_tag != ''
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-tags.outputs.python_tag }}

      - name: Mirror canonical rules into python wheel layout
        run: cp rules/rules.toml python/vacant/rules.toml

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          target: ${{ matrix.target }}
          args: --release --out dist

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.target }}
          path: python/dist

  sdist:
    needs: [release-please, resolve-tags]
    if: needs.resolve-tags.outputs.python_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-tags.outputs.python_tag }}

      - name: Mirror canonical rules into python wheel layout
        run: cp rules/rules.toml python/vacant/rules.toml

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: python/dist

  publish-pypi:
    needs: [resolve-tags, build-wheels-linux, build-wheels-macos, sdist]
    if: needs.resolve-tags.outputs.python_tag != ''
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  build-js-linux:
    needs: [release-please, resolve-tags]
    if: needs.resolve-tags.outputs.js_tag != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-tags.outputs.js_tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Mirror canonical rules into the npm layout
        run: cp rules/rules.toml js/vacant/rules.toml

      - name: Install JS deps
        run: npm ci
        working-directory: js

      - name: Install aarch64 cross-toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build napi-rs binding
        env:
          # Standard ubuntu cross-toolchain for aarch64-linux (gcc-aarch64-linux-gnu)
          # — well-tested with ring's ARM ASM. napi-rs's bundled cross-toolchain
          # (--use-napi-cross) miscompiles ring 0.17 with a missing __ARM_ARCH define.
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: npx napi build --release --target ${{ matrix.target }} --platform --manifest-path ../crates/vacant-js/Cargo.toml --output-dir . --package-json-path ./package.json --js index.cjs
        working-directory: js

      - uses: actions/upload-artifact@v7
        with:
          name: js-${{ matrix.target }}
          path: |
            js/*.node
            js/index.cjs
            js/index.d.ts

  build-js-macos:
    needs: [release-please, resolve-tags]
    if: needs.resolve-tags.outputs.js_tag != ''
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-tags.outputs.js_tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Mirror canonical rules into the npm layout
        run: cp rules/rules.toml js/vacant/rules.toml

      - name: Install JS deps
        run: npm ci
        working-directory: js

      - name: Build napi-rs binding
        run: npx napi build --release --target ${{ matrix.target }} --platform --manifest-path ../crates/vacant-js/Cargo.toml --output-dir . --package-json-path ./package.json --js index.cjs
        working-directory: js

      - uses: actions/upload-artifact@v7
        with:
          name: js-${{ matrix.target }}
          path: |
            js/*.node
            js/index.cjs
            js/index.d.ts

  publish-npm:
    needs: [resolve-tags, build-js-linux, build-js-macos]
    if: needs.resolve-tags.outputs.js_tag != ''
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-tags.outputs.js_tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Mirror canonical rules into the npm layout
        run: cp rules/rules.toml js/vacant/rules.toml

      - name: Install JS deps
        run: npm ci
        working-directory: js

      - uses: dtolnay/rust-toolchain@stable

      - name: Download all JS artifacts
        uses: actions/download-artifact@v8
        with:
          path: js/artifacts
          pattern: js-*
          merge-multiple: true

      - name: Move .node binaries into per-platform npm stubs
        working-directory: js
        run: npx napi artifacts --output-dir artifacts --npm-dir npm

      - name: Generate napi loader (index.cjs / index.d.ts) for the main package
        working-directory: js
        run: npm run build:napi

      - name: Build dist (tsup)
        run: npm run build
        working-directory: js

      - name: Sync stub versions and publish per-platform stubs (napi prepublish)
        working-directory: js
        run: npx napi prepublish -t npm

      - name: Publish main package to npm
        working-directory: js
        run: npm publish --provenance --access public
