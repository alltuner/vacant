name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  rules-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify embedded rules.toml mirrors match canonical
        run: |
          diff -q rules/rules.toml crates/vacant/data/rules.toml
          diff -q rules/rules.toml python/vacant/rules.toml
          diff -q rules/rules.toml js/vacant/rules.toml

  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.2.0

      - name: Test ingest scripts
        run: uv run --with pytest pytest ingest/tests

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --release --workspace

      - name: Test
        run: cargo test --release --workspace

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.2.0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Sync (builds the PyO3 extension)
        run: uv sync
        working-directory: python

      - name: Ruff format
        run: uv run ruff format --check .
        working-directory: python

      - name: Ruff lint
        run: uv run ruff check .
        working-directory: python

      - name: Pytest
        run: uv run pytest
        working-directory: python

      - name: Smoke test the binding
        run: uv run python -c "from vacant import check_many; r = check_many(['google.com'])[0]; assert r.status.value in {'registered','reserved'}, r"
        working-directory: python

  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Mirror canonical rules into the npm layout
        run: cp rules/rules.toml js/vacant/rules.toml

      - name: Install JS deps
        run: npm ci
        working-directory: js

      - name: Build napi-rs binding
        run: npm run build:napi
        working-directory: js

      - name: tsup build
        run: npm run build
        working-directory: js

      - name: Typecheck
        run: npm run typecheck
        working-directory: js

      - name: Smoke test
        run: npm test
        working-directory: js

      - name: CLI smoke
        run: node dist/bin/vacant.cjs google.com
        working-directory: js
